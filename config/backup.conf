# OracleShieldBackup configuration
# Edit these values on the Linux Oracle host before enabling cron.

# Project installation path. The scripts provide PROJECT_ROOT_DEFAULT at runtime.
PROJECT_ROOT="${PROJECT_ROOT:-${PROJECT_ROOT_DEFAULT:-/opt/oracle-shield-backup}}"

# Oracle environment.
ORACLE_SID="${ORACLE_SID:-ORCLCDB}"
ORACLE_HOME="${ORACLE_HOME:-/u01/app/oracle/product/19.0.0/dbhome_1}"
RMAN_TARGET="${RMAN_TARGET:-/}"
NLS_DATE_FORMAT="${NLS_DATE_FORMAT:-YYYY-MM-DD HH24:MI:SS}"

# Local backup storage. Keep this on a filesystem separate from Oracle datafiles.
BACKUP_ROOT="${BACKUP_ROOT:-/u02/oracle_backups}"
RMAN_BACKUP_DIR="${RMAN_BACKUP_DIR:-${BACKUP_ROOT}/rman}"
ARCHIVE_BACKUP_DIR="${ARCHIVE_BACKUP_DIR:-${BACKUP_ROOT}/archivelog}"
STAGING_DIR="${STAGING_DIR:-${BACKUP_ROOT}/staging}"
LOG_DIR="${LOG_DIR:-${PROJECT_ROOT}/logs}"
REPORT_DIR="${REPORT_DIR:-${PROJECT_ROOT}/reports}"

# RMAN policy.
RETENTION_DAYS="${RETENTION_DAYS:-14}"
LOG_RETENTION_DAYS="${LOG_RETENTION_DAYS:-30}"
RMAN_RETENTION_POLICY="${RMAN_RETENTION_POLICY:-RECOVERY WINDOW OF 14 DAYS}"
ARCHIVELOG_DELETE_POLICY="${ARCHIVELOG_DELETE_POLICY:-BACKED UP 1 TIMES TO DEVICE TYPE DISK}"
RMAN_CHANNELS="${RMAN_CHANNELS:-2}"
INCREMENTAL_MODE="${INCREMENTAL_MODE:-CUMULATIVE}"

# AWS S3 archival.
ENABLE_S3_UPLOAD="${ENABLE_S3_UPLOAD:-true}"
S3_BUCKET="${S3_BUCKET:-s3://replace-me-oracle-backups}"
S3_PREFIX="${S3_PREFIX:-${ORACLE_SID}}"
AWS_PROFILE="${AWS_PROFILE:-}"
AWS_REGION="${AWS_REGION:-us-east-1}"
AWS_STORAGE_CLASS="${AWS_STORAGE_CLASS:-STANDARD_IA}"
S3_SSE="${S3_SSE:-AES256}"
DRY_RUN="${DRY_RUN:-false}"

# Alerts. Requires mailx, mail, or an AWS SNS topic.
ENABLE_ALERTS="${ENABLE_ALERTS:-true}"
ALERT_EMAIL="${ALERT_EMAIL:-dba-team@example.com}"
ALERT_FROM="${ALERT_FROM:-oracle-backup@example.com}"
MAIL_CMD="${MAIL_CMD:-mailx}"
SNS_TOPIC_ARN="${SNS_TOPIC_ARN:-}"

# Optional display override used in reports and alerts.
HOSTNAME_OVERRIDE="${HOSTNAME_OVERRIDE:-}"

# Restore tests run in validation mode by default and do not overwrite datafiles.
RESTORE_TEST_MODE="${RESTORE_TEST_MODE:-validate}"
