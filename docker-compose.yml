name: oracle-shield-backup

services:
  oracle-db:
    image: ${ORACLE_IMAGE:-container-registry.oracle.com/database/free:latest}
    container_name: ${ORACLE_CONTAINER_NAME:-oracle-shield-db}
    environment:
      ORACLE_PWD: ${ORACLE_PWD:-OracleShield_123}
      ENABLE_ARCHIVELOG: "true"
      ENABLE_FORCE_LOGGING: "true"
    ports:
      - "${ORACLE_LISTENER_PORT:-1521}:1521"
    volumes:
      - oracle_oradata:/opt/oracle/oradata
      - .:/opt/oracle/oracle-shield
      - ./docker/backups:/opt/oracle/backups
    shm_size: "1g"

volumes:
  oracle_oradata:

